name: na-cathode
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.11
  - pytorch>=2.1
  - pytorch-cuda=12.1
  - numpy
  - pandas
  - scikit-learn
  - matplotlib
  - jupyter
  - jupyterlab
  - ipykernel
  - pip
  - pip:
    - pymatgen
    - mp-api
    - matgl
    - chgnet
    - matminer
    - torch-geometric
    - plotly
    - ase
    - kaleido
